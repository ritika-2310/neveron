<!DOCTYPE html>
<html lang="en">
    <head>
        <title>neveron</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
        <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="navbar">
            <div id="logo"></div>
            <div id="items">
                <div id="product_box">
                    <div id="product" class="decor">product</div>
                    <button class="decor arrow arrow_up" id="product_up" onclick="myopen(this)">
                        <span>&#8964</span>
                    </button>
                    <button class="decor arrow arrow_down" style="display:none;" id="product_down" onclick="myclose(this)">
                        <span>&#8963;</span>
                    </button>
                </div>
                <div id="price" class="decor">price</div>
                <div id="about" class="decor">about us</div>
                <div id="faq" class="decor">FAQs</div>
            </div>
            <div id="starts">
                <div id="log" class="decor">log in</div>
                <div id="start" class="decor">start for free</div>
            </div>
        </div>
        <section id="hero_section">
            <section id="left_hero">
                <div id="sub_head">
                    <div id="box1" class="sub_head_decor">Build, launch & scale websites, apps &</div>
                    <div id="box2">
                        <div id="box__21" class="sub_head_decor">AI tools</div>
                        <div id="box_21" class="sub_head_decor">-</div>
                        <div id="box_22">faster.</div>
                    </div>
                </div>
                <div id="sub_head_2">The all-in-one platform to bring your ideas to life. No code. No limits.</div>
                <div id="btns">
                    <button id="book">Book a demo</button>
                    <button id="know">Know about us</button>
                </div>
            </section>
            <section id="right_hero">
                <div id="wrapper">
                    <div id="dash_box">
                        <img src="dash.jpeg" alt="dashboard image" id="dash">
                    </div>
                    <div id="phone_box">
                        <img src="phone.jpeg" alt="phone image" id="phone">
                    </div>
                </div>
            </section>
        </section>
        <div id="logo_3d_box">
            <div id="canvas-container"></div>
        </div>
        <section id="transition_space"></section>
        <section id="service">
            <div id="left_serv">
                <div id="serv_box1" class="serv">
                    <div id="box11" class="serv_box">
                        <img src="aitool.jpeg" alt="Custom AI Tools" class="serv_img">
                    </div>
                    <div id="box12" class="serv_box_hov">Custom AI Tools</div>
                </div>
                <div id="serv_box2" class="serv">
                    <div id="box21" class="serv_box">
                        <img src="soft.jpeg" alt="Custom Software" class="serv_img">
                    </div>
                    <div id="box22" class="serv_box_hov">Custom Software</div>
                </div>
            </div>
            <div id="mid_serv">
                <div id="serv_head">our services</div>
                <div id="serv_box3" class="serv">
                    <div id="box31" class="serv_box">
                        <img src="custtool.jpeg" alt="Custom Tools" class="serv_img">
                    </div>
                    <div id="box32" class="serv_box_hov">Custom Tools</div>
                </div>
            </div>
            <div id="right_serv">
                <div id="serv_box4" class="serv">
                    <div id="box41" class="serv_box">
                        <img src="digital.jpeg" alt="Digital Marketing Solutions" class="serv_img">
                    </div>
                    <div id="box42" class="serv_box_hov">Digital Marketing Solutions</div>
                </div>
                <div id="serv_box5" class="serv">
                    <div id="box51" class="serv_box">
                        <img src="seogeo.jpeg" alt="SEO+GEO" class="serv_img">
                    </div>
                    <div id="box52" class="serv_box_hov">SEO+GEO</div>
                </div>
            </div>
        </section>
        <section id="icons">
            <div id="icon_heads">
                <div id="icon_head1" class="icon_heads"></div>
                <div id="icon_head2" class="icon_heads"></div>
                <div id="icon_head3" class="icon_heads"></div>
            </div>
            <div id="icons_box">
                <div id="icon1_box">
                    <div id="icon1" class="icon"></div>
                </div>
                <div id="icon2_box">
                    <div id="icon2" class="icon"></div>
                </div>
                <div id="icon3_box">
                    <div id="icon3" class="icon"></div>
                </div>
                <div id="icon4_box">
                    <div id="icon4" class="icon"></div>
                </div>
                <div id="icon5_box">
                    <div id="icon5" class="icon"></div>
                </div>
                <div id="icon6_box">
                    <div id="icon6" class="icon"></div>
                </div>
                <div id="icon7_box">
                    <div id="icon7" class="icon"></div>
                </div>
            </div>
        </section>
        <div id="eg">
        </div>
        <script src="main.js"></script>
        <script type="module" src="model.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/Flip.min.js"></script>
        <script src="animation.js"></script>
        <script src="serv_anim.js"></script>
        <script src="icon_anim.js"></script>
        <script src="head_anim.js"></script>
    </body>
</html>
